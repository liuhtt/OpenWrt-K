<%+header%>

<h2><%:OpenWrt-K 在线更新%></h2>
<div class="cbi-map-descr">
	从当前固件对应的 GitHub Releases 检查最新版并执行在线升级。<br />
	升级文件会先下载到 <code>/tmp</code>，通过 <code>sysupgrade -T</code> 校验后再开始正式升级。<br />
	建议升级前确认 <code>/tmp</code> 剩余空间足够，并做好配置备份。
</div>

<div id="action-feedback" class="alert-message notice" style="display:none; margin-bottom: 1em;"></div>

<div class="cbi-section">
	<table class="table" id="current-info">
		<tr><th width="180">当前固件</th><td>读取中…</td></tr>
	</table>
</div>

<div class="cbi-section">
	<table class="table" id="latest-release">
		<tr><th width="180">最新发布</th><td>尚未检查</td></tr>
	</table>
</div>

<div class="cbi-section">
	<div class="cbi-value">
		<label class="cbi-value-title" for="asset_name">升级固件</label>
		<div class="cbi-value-field">
			<select id="asset_name" class="cbi-input-select" style="min-width: 32em;"></select>
			<div class="cbi-value-description" id="asset-hint">将自动优先推荐与当前启动方式、根文件系统匹配的镜像。</div>
		</div>
	</div>
	<div class="cbi-value">
		<label class="cbi-value-title" for="keep_settings">保留配置</label>
		<div class="cbi-value-field">
			<label>
				<input type="checkbox" id="keep_settings" checked="checked" />
				保留当前配置后升级
			</label>
		</div>
	</div>
	<div class="right">
		<input class="btn cbi-button cbi-button-neutral" id="check-release" type="button" value="检查更新" onclick="checkRelease()" />
		<input class="btn cbi-button cbi-button-apply" id="start-upgrade" type="button" value="开始升级" onclick="startUpgrade()" />
	</div>
</div>

<div class="cbi-section">
	<table class="table" id="task-status">
		<tr><th width="180">任务状态</th><td>空闲</td></tr>
	</table>
</div>

<div class="cbi-section">
	<div style="max-width: 42em;">
		<div id="task-progress-text" style="margin-bottom: .4em;">当前无下载任务</div>
		<div style="width:100%; background:#eee; border-radius:6px; overflow:hidden;">
			<div id="task-progress-bar" style="width:0%; height:14px; line-height:14px; background:#4b8bff; transition:width .2s ease;"></div>
		</div>
	</div>
</div>

<div class="cbi-section">
	<h3>后台日志</h3>
	<pre id="task-log" style="white-space: pre-wrap; word-break: break-all; max-height: 24em; overflow: auto;">暂无日志</pre>
</div>

<script type="text/javascript">
//<![CDATA[
var checkUrl = '<%=url("admin/system/openwrt-k-update/check")%>';
var statusUrl = '<%=url("admin/system/openwrt-k-update/status")%>';
var upgradeUrl = '<%=url("admin/system/openwrt-k-update/upgrade")%>';
var checkBtn;
var upgradeBtn;

function setFeedback(message, type) {
	var el = document.getElementById('action-feedback');
	if (!message) {
		el.style.display = 'none';
		el.innerHTML = '';
		el.className = 'alert-message notice';
		return;
	}
	el.style.display = '';
	el.className = 'alert-message ' + (type || 'notice');
	el.innerHTML = esc(message);
}

function esc(str) {
	if (str === null || str === undefined)
		return '';
	return String(str)
		.replace(/&/g, '&amp;')
		.replace(/</g, '&lt;')
		.replace(/>/g, '&gt;')
		.replace(/"/g, '&quot;')
		.replace(/'/g, '&#39;');
}

function setRows(elId, rows) {
	var html = [];
	for (var i = 0; i < rows.length; i++) {
		html.push('<tr><th width="180">' + esc(rows[i][0]) + '</th><td>' + rows[i][1] + '</td></tr>');
	}
	document.getElementById(elId).innerHTML = html.join('');
}

function shortHash(hash) {
	if (!hash)
		return '-';
	hash = String(hash);
	return hash.length > 12 ? hash.substring(0, 12) : hash;
}

function getVersionStatus(latest) {
	if (!latest)
		return { message: '尚未检查', type: 'notice' };
	if (latest.version_status === 'current')
		return { message: latest.version_status_message || '当前已是最新版本', type: 'success' };
	if (latest.version_status === 'outdated')
		return { message: latest.version_status_message || '检测到新版本，可按需升级', type: 'notice' };
	return { message: latest.version_status_message || '已获取最新发布信息，但暂时无法判断当前是否为最新版本', type: 'notice' };
}

function renderVersionStatus(latest) {
	var status = getVersionStatus(latest);
	var color = status.type === 'success' ? '#2d8a34' : (latest && latest.version_status === 'outdated' ? '#d46b08' : '#666');
	return '<span style="color:' + color + '; font-weight:600;">' + esc(status.message) + '</span>';
}

function renderCurrent(current) {
	if (!current)
		return;

	setRows('current-info', [
		['系统', esc(current.system || '-')],
		['版本', esc(current.release || '-') + (current.revision ? ' / ' + esc(current.revision) : '')],
		['架构', esc(current.architecture || '-')],
		['目标平台', esc(current.target || '-')],
		['启动方式', esc(current.boot_mode || '-')],
		['根文件系统', esc(current.rootfs_type || '-')],
		['固件标识', current.release_tag ? esc(current.release_tag) : (current.build_run_id ? 'Run #' + esc(current.build_run_id) : '-')],
		['编译者', esc(current.compiler || '-')],
		['编译时间', esc(current.compile_start_time || '-')],
		['源码提交', esc(shortHash(current.build_commit || '-'))],
		['仓库', current.repository_url ? '<a href="' + esc(current.repository_url) + '" target="_blank" rel="noopener noreferrer">' + esc(current.repository_url) + '</a>' : '-'],
		['/tmp 剩余空间', esc(current.temp_free || '-')]
	]);
}

function renderLatest(latest, error) {
	var rows = [];
	var select = document.getElementById('asset_name');
	var selectedValue = select.value;
	select.innerHTML = '';

	if (!latest) {
		rows.push(['最新发布', error ? '<span style="color:#c00;">' + esc(error) + '</span>' : '尚未检查']);
		setRows('latest-release', rows);
		document.getElementById('asset-hint').innerHTML = '请先点击“检查更新”。';
		return;
	}

	rows.push(['发布版本', esc(latest.tag_name || '-')]);
	rows.push(['发布名称', esc(latest.name || '-')]);
	rows.push(['当前状态', renderVersionStatus(latest)]);
	rows.push(['发布时间', esc(latest.published_at || '-')]);
	rows.push(['发布页面', latest.html_url ? '<a href="' + esc(latest.html_url) + '" target="_blank" rel="noopener noreferrer">打开 GitHub Release</a>' : '-']);
	rows.push(['构建运行ID', latest.artifact_run_id ? 'Run #' + esc(latest.artifact_run_id) : '-']);
	rows.push(['推荐固件', esc(latest.recommended_asset || '-')]);
	rows.push(['可选固件数量', esc((latest.assets || []).length)]);
	setRows('latest-release', rows);

	var assets = latest.assets || [];
	for (var i = 0; i < assets.length; i++) {
		var asset = assets[i];
		var opt = document.createElement('option');
		opt.value = asset.name;
		opt.text = asset.name + ' (' + (asset.size_human || '-') + ')' + (asset.recommended ? ' [推荐]' : '');
		if ((selectedValue && asset.name === selectedValue) || (!selectedValue && asset.recommended))
			opt.selected = true;
		select.appendChild(opt);
	}

	if (!assets.length) {
		var empty = document.createElement('option');
		empty.value = '';
		empty.text = '当前发布未找到可在线升级的固件文件';
		select.appendChild(empty);
		document.getElementById('asset-hint').innerHTML = '该 release 中没有匹配的固件资产。';
	} else {
		document.getElementById('asset-hint').innerHTML = '优先选择推荐镜像；如果你的磁盘布局比较特殊，也可以手动切换。';
	}
}

function renderTask(task) {
	if (!task)
		return;

	var stateMap = {
		idle: '空闲',
		downloading: '下载中',
		validating: '校验中',
		rebooting: '升级中 / 即将重启',
		error: '失败'
	};

	setRows('task-status', [
		['状态', esc(stateMap[task.state] || task.state || 'idle')],
		['说明', esc(task.message || '-')],
		['目标版本', esc(task.release_tag || '-')],
		['固件文件', esc(task.asset_name || '-')],
		['下载进度', task.total_size > 0 ? esc(task.downloaded_size_human || '0 B') + ' / ' + esc(task.total_size_human || '-') + ' (' + esc(task.progress || 0) + '%)' : (task.state === 'validating' || task.state === 'rebooting' ? '100%' : '-')],
		['保留配置', task.keep_settings ? '是' : '否'],
		['更新时间', esc(task.updated_at || '-')]
	]);

	document.getElementById('task-log').textContent = task.log || '暂无日志';
	document.getElementById('task-progress-bar').style.width = String(task.progress || 0) + '%';
	document.getElementById('task-progress-text').textContent =
		task.total_size > 0
			? '下载进度：' + (task.downloaded_size_human || '0 B') + ' / ' + (task.total_size_human || '-') + '（' + (task.progress || 0) + '%）'
			: (task.state === 'validating' || task.state === 'rebooting'
				? '下载已完成，正在处理固件'
				: '当前无下载任务');

	var running = task.state === 'downloading' || task.state === 'validating' || task.state === 'rebooting';
	upgradeBtn.disabled = running;
	checkBtn.disabled = running;
	if (running)
		upgradeBtn.value = task.state === 'downloading' ? '下载中...' : (task.state === 'validating' ? '校验中...' : '升级中...');
	else
		upgradeBtn.value = '开始升级';
}

function checkRelease() {
	setFeedback('正在检查最新发布...', 'notice');
	checkBtn.disabled = true;
	checkBtn.value = '检查中...';
	XHR.get(checkUrl, null, function(x, data) {
		checkBtn.disabled = false;
		checkBtn.value = '检查更新';
		if (!data) {
			setFeedback('检查更新请求失败', 'warning');
			renderLatest(null, '请求失败');
			return;
		}
		renderCurrent(data.current);
		renderTask(data.task);
		if (data.ok) {
			var status = getVersionStatus(data.latest);
			setFeedback(status.message, status.type);
			renderLatest(data.latest);
		} else {
			setFeedback(data.error || '检查失败', 'warning');
			renderLatest(null, data.error || '检查失败');
		}
	});
}

function startUpgrade() {
	var select = document.getElementById('asset_name');
	var assetName = select && select.value ? select.value : '';
	if (!assetName) {
		alert('请先检查更新并选择一个固件文件');
		return;
	}

	if (!confirm('确定开始在线升级吗？下载完成并校验通过后将自动执行 sysupgrade。')) {
		return;
	}

	setFeedback('正在创建升级任务...', 'notice');
	upgradeBtn.disabled = true;
	upgradeBtn.value = '启动中...';
	XHR.post(upgradeUrl, {
		asset_name: assetName,
		keep_settings: document.getElementById('keep_settings').checked ? '1' : '0'
	}, function(x, data) {
		if (!data) {
			setFeedback('启动升级任务失败', 'warning');
			upgradeBtn.disabled = false;
			upgradeBtn.value = '开始升级';
			return;
		}
		if (!data.ok) {
			setFeedback(data.error || '启动升级任务失败', 'warning');
			upgradeBtn.disabled = false;
			upgradeBtn.value = '开始升级';
			return;
		}
		setFeedback(data.message || '升级任务已启动', 'success');
		if (data.latest)
			renderLatest(data.latest);
		if (data.task)
			renderTask(data.task);
	});
}

XHR.poll(5, statusUrl, null, function(x, data) {
	if (!data)
		return;
	renderCurrent(data.current);
	renderTask(data.task);
	if (data.latest)
		renderLatest(data.latest);
	if (data.task && data.task.state === 'error')
		setFeedback(data.task.message || '在线升级失败', 'warning');
	else if (data.task && data.task.state === 'rebooting')
		setFeedback(data.task.message || '固件校验通过，设备即将重启', 'success');
});

checkBtn = document.getElementById('check-release');
upgradeBtn = document.getElementById('start-upgrade');
checkRelease();
//]]>
</script>

<%+footer%>
